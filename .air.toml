# Air configuration for Go hot reload
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/cbt-patra"
  cmd = "go build -o ./tmp/cbt-patra ./cmd/server"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "web", "node_modules", "Docs", "exampatra", "docker", "migrations"]
  exclude_file = []
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = true
  follow_symlink = false
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = 500
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
