# =============================================================
# CBT Patra - Docker Development (All-in-One)
# Semua service jalan di Docker, termasuk Go + Vue hot reload
# Jalankan: docker compose up
# =============================================================

services:
  # ─── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cbt_postgres
    restart: unless-stopped
    ports:
      - "4100:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cbt_patra}
      POSTGRES_USER: ${DB_USERNAME:-cbt_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cbt_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cbt_user} -d ${DB_DATABASE:-cbt_patra}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cbt_redis
    restart: unless-stopped
    ports:
      - "4200:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MinIO (Object Storage) ─────────────────────
  minio:
    image: minio/minio:latest
    container_name: cbt_minio
    restart: unless-stopped
    ports:
      - "4300:9000"
      - "4301:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Go Backend (Hot Reload via Air) ─────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: cbt_api
    restart: unless-stopped
    ports:
      - "4000:8080"
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      APP_ENV: development
      APP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-cbt_patra}
      DB_USERNAME: ${DB_USERNAME:-cbt_user}
      DB_PASSWORD: ${DB_PASSWORD:-cbt_password}
      DB_MAX_OPEN: "25"
      DB_MAX_IDLE: "5"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: cbt-patra
      MINIO_USE_SSL: "false"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-32chars-minimum}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-32chars-minimum}
      JWT_ACCESS_TTL: "900"
      JWT_REFRESH_TTL: "604800"
      ALLOWED_ORIGINS: http://localhost:4001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Vue Frontend (Vite Dev Server) ──────────────
  web:
    image: node:20-alpine
    container_name: cbt_web
    restart: unless-stopped
    working_dir: /app
    ports:
      - "4001:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_API_URL=http://localhost:4000

volumes:
  postgres_data:
  redis_data:
  minio_data:
  go_mod_cache:
  go_build_cache:
  web_node_modules:
